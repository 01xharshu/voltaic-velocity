name: VoltaicVelocity

options:
  bundleIdPrefix: com.voltaicvelocity
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: none

packages:
  CodeEditorView:
    url: https://github.com/mchakravarty/CodeEditorView.git
    exactVersion: 0.15.4
  OllamaKit:
    url: https://github.com/kevinhermawan/OllamaKit.git
    exactVersion: 5.0.5
  MLX:
    url: https://github.com/ml-explore/mlx-swift.git
    from: 0.20.0
  MLXLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main

targets:
  VoltaicVelocity:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/VoltaicVelocityApp
        excludes:
          - Resources
    info:
      path: Sources/VoltaicVelocityApp/Resources/Info.plist
    entitlements:
      path: VoltaicVelocity.entitlements
    dependencies:
      - package: CodeEditorView
        product: CodeEditorView
      - package: OllamaKit
        product: OllamaKit
      - package: MLX
        product: MLX
      - package: MLX
        product: MLXRandom
      - package: MLX
        product: MLXNN
      - package: MLX
        product: MLXOptimizers
      - package: MLX
        product: MLXFFT
      - package: MLXLM
        product: MLXLLM
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.voltaicvelocity.app
        PRODUCT_NAME: "Voltaic Velocity"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Sources/VoltaicVelocityApp/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_ENTITLEMENTS: VoltaicVelocity.entitlements
        SWIFT_STRICT_CONCURRENCY: minimal

  VoltaicVelocityTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"
    sources: [Tests/VoltaicVelocityTests]
    dependencies:
      - target: VoltaicVelocity
